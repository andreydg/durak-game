spring.application.name=durak-game

# Render (and other PaaS) inject PORT; local default stays 8080
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Firestore database id for Cloud Run persistence ("(default)" unless explicitly changed).
app.firestore.database-id=${FIRESTORE_DATABASE_ID:(default)}

# Auto-play (primary LLM)
autoplay.request-timeout-ms=${AUTOPLAY_REQUEST_TIMEOUT_MS:30000}
autoplay.gemini.enabled=${AUTOPLAY_GEMINI_ENABLED:true}
autoplay.gemini.base-url=${AUTOPLAY_GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
autoplay.gemini.model=${AUTOPLAY_GEMINI_MODEL:gemini-3.1-flash-lite-preview}
autoplay.gemini.thinking-level=${AUTOPLAY_GEMINI_THINKING_LEVEL:HIGH}
autoplay.gemini.reasoning-budget-seconds=${AUTOPLAY_GEMINI_REASONING_BUDGET_SECONDS:30}
autoplay.gemini.public-card-memory-enabled=${AUTOPLAY_GEMINI_PUBLIC_CARD_MEMORY_ENABLED:true}
autoplay.gemini.api-key=${GEMINI_API_KEY:}
autoplay.qwen.enabled=${AUTOPLAY_QWEN_ENABLED:false}
autoplay.qwen.base-url=${AUTOPLAY_QWEN_BASE_URL:https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
autoplay.qwen.model=${AUTOPLAY_QWEN_MODEL:qwen3.5-omni-flash}
autoplay.qwen.api-key=${AUTOPLAY_QWEN_API_KEY:}
