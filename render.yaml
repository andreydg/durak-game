# Render Blueprint — https://render.com/docs/blueprint-spec
# In the Render dashboard: New → Blueprint → connect this repo.

services:
  - type: web
    name: durak-game
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=75.0
